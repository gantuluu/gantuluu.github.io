<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajukan Pinjaman</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
        }
        .mobile-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background-color: #ffffff;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            padding-bottom: 2rem;
        }
        input[type=range] {
            height: 6px;
            -webkit-appearance: none;
            width: 100%;
            background: #e2e8f0;
            border-radius: 5px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <!-- Header -->
        <header class="p-5 flex items-center border-b">
            <button onclick="window.location.href='dashboard.html'" class="p-2 -ml-2 text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <h1 class="ml-2 text-lg font-bold text-gray-800">Pengajuan Pinjaman</h1>
        </header>

        <main class="p-5 space-y-8">
            <!-- Info Limit -->
            <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 flex justify-between items-center">
                <div>
                    <p class="text-[10px] text-blue-600 font-bold uppercase">Maksimal Limit Anda</p>
                    <p class="text-xl font-extrabold text-blue-800" id="display_limit">Rp 0</p>
                </div>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>

            <!-- Form -->
            <form id="loanForm" class="space-y-6">
                <!-- Jumlah Pinjaman Slider -->
                <div class="space-y-4">
                    <div class="flex justify-between items-end">
                        <label class="text-sm font-bold text-gray-700">Jumlah Pinjaman</label>
                        <span class="text-xl font-black text-blue-600" id="display_amount">Rp 500.000</span>
                    </div>
                    <input type="range" id="loan_amount" name="loan_amount" min="500000" step="100000" class="w-full cursor-pointer">
                    <div class="flex justify-between text-[10px] text-gray-400 font-bold uppercase">
                        <span>Min. Rp 500rb</span>
                        <span id="label_max">Max. Rp 0</span>
                    </div>
                </div>

                <!-- Tenor Slider -->
                <div class="space-y-4">
                    <div class="flex justify-between items-end">
                        <label class="text-sm font-bold text-gray-700">Tenor (Durasi)</label>
                        <span class="text-lg font-bold text-gray-800" id="display_duration">3 Bulan</span>
                    </div>
                    <input type="range" id="loan_duration_installment" name="loan_duration_installment" min="3" max="24" step="3" value="3" class="w-full cursor-pointer">
                    <div class="flex justify-between text-[10px] text-gray-400 font-bold uppercase">
                        <span>3 Bulan</span>
                        <span>24 Bulan</span>
                    </div>
                </div>

                <!-- Rincian Biaya -->
                <div class="bg-gray-50 rounded-2xl p-5 space-y-3">
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500 italic" id="display_interest_label">Bunga (0.90%)</span>
                        <span class="font-semibold text-gray-700" id="display_interest_value">Rp 0</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500">Biaya Admin (10%)</span>
                        <span class="font-semibold text-red-500" id="display_admin_fee">- Rp 0</span>
                    </div>
                    <div class="flex justify-between text-sm border-t border-dashed border-gray-300 pt-2 bg-blue-50/50 -mx-2 px-2 py-1 rounded">
                        <span class="text-blue-700 font-bold">Jumlah Diterima</span>
                        <span class="font-bold text-blue-700" id="display_received_amount">Rp 0</span>
                    </div>
                    <div class="flex justify-between text-sm border-t border-dashed border-gray-300 pt-2">
                        <span class="text-gray-700 font-medium">Total Pengembalian</span>
                        <span class="font-bold text-gray-900" id="display_total_return">Rp 0</span>
                    </div>
                    <div class="flex justify-between text-sm border-t border-gray-200 pt-3">
                        <span class="text-gray-800 font-bold">Cicilan Per Bulan</span>
                        <span class="font-black text-blue-600 text-lg" id="display_monthly">Rp 0</span>
                    </div>
                </div>

                <!-- Hidden Inputs untuk Kalkulasi -->
                <input type="hidden" id="loan_admin_fee" name="loan_admin_fee">
                <input type="hidden" id="loan_monthly_installment" name="loan_monthly_installment">

                <!-- Submit Button -->
                <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 active:scale-95 transition disabled:opacity-50 disabled:pointer-events-none">
                    Ajukan Sekarang
                </button>
            </form>
        </main>

        <!-- Status Message Modal -->
        <div id="statusModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-6">
            <div class="bg-white w-full max-w-sm rounded-3xl p-8 text-center space-y-4 shadow-2xl">
                <div id="modal_icon" class="mx-auto w-20 h-20 rounded-full flex items-center justify-center"></div>
                <h3 id="modal_title" class="text-2xl font-black text-gray-800"></h3>
                <p id="modal_msg" class="text-gray-500 leading-relaxed"></p>
                <button onclick="window.location.href='dashboard.html'" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition shadow-lg">Kembali ke Dashboard</button>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi API
        const AIRTABLE_TOKEN = "patPitTPo10xWFNOy.720741c42e78616c9cc80ca3ba0aa27ff9e53068b1ebd1c77adb21a97d88b4da";
        const BASE_ID = "appU6nT3gXVjWYhyP";
        const TABLE_NAME = "datapinjol";
        const RECORD_ID = localStorage.getItem('id'); // ID dari proses login/register

        let userLimit = 0;

        const amountSlider = document.getElementById('loan_amount');
        const durationSlider = document.getElementById('loan_duration_installment');
        const form = document.getElementById('loanForm');

        function formatRupiah(num) {
            return "Rp " + Math.round(num || 0).toLocaleString('id-ID');
        }

        // 1. Ambil Limit Awal dari Airtable
        async function fetchInitialData() {
            if (!RECORD_ID) {
                console.error("ID tidak ditemukan. Silakan login kembali.");
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}/${RECORD_ID}`, {
                    headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` }
                });
                
                if (!response.ok) throw new Error("Gagal mengambil data limit");
                
                const data = await response.json();
                
                if (data && data.fields) {
                    // Ambil limit_loan dari Airtable, default 500rb jika kosong
                    userLimit = Number(data.fields.limit_loan) || 500000;
                    
                    amountSlider.max = userLimit;
                    document.getElementById('display_limit').textContent = formatRupiah(userLimit);
                    document.getElementById('label_max').textContent = "Max. " + formatRupiah(userLimit);
                    
                    calculateValues();
                }
            } catch (error) {
                console.error("Error:", error.message);
                // Fallback jika API gagal
                userLimit = 500000;
                amountSlider.max = userLimit;
                document.getElementById('display_limit').textContent = formatRupiah(userLimit);
                calculateValues();
            }
        }

        // 2. Kalkulasi Dinamis
        function calculateValues() {
            const amount = Number(amountSlider.value);
            const duration = Number(durationSlider.value);
            
            // Bunga progresif (0.90% - 1.40%)
            const minRate = 0.009;
            const maxRate = 0.014;
            const minDuration = 3;
            const maxDuration = 24;
            
            const currentInterestRate = minRate + (duration - minDuration) * (maxRate - minRate) / (maxDuration - minDuration);
            
            const adminFee = amount * 0.1; // 10% admin
            const receivedAmount = amount - adminFee;
            const totalInterest = amount * currentInterestRate * duration;
            const totalToPay = amount + totalInterest;
            const monthly = totalToPay / duration;

            // Update UI
            document.getElementById('display_amount').textContent = formatRupiah(amount);
            document.getElementById('display_duration').textContent = duration + " Bulan";
            document.getElementById('display_interest_label').textContent = `Bunga (${(currentInterestRate * 100).toFixed(2)}%)`;
            document.getElementById('display_interest_value').textContent = formatRupiah(totalInterest);
            document.getElementById('display_admin_fee').textContent = "- " + formatRupiah(adminFee);
            document.getElementById('display_received_amount').textContent = formatRupiah(receivedAmount);
            document.getElementById('display_total_return').textContent = formatRupiah(totalToPay);
            document.getElementById('display_monthly').textContent = formatRupiah(monthly);

            // Simpan ke hidden field untuk dikirim ke Airtable
            document.getElementById('loan_admin_fee').value = Math.round(adminFee);
            document.getElementById('loan_monthly_installment').value = Math.round(monthly);
        }

        // 3. Kirim Pembaruan Data ke Airtable
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Memproses Pengajuan...
            `;

            // Data yang akan di-update di Airtable (tanpa field saldo_utama)
            const payload = {
                fields: {
                    loan_amount: Number(amountSlider.value),
                    loan_duration_installment: Number(durationSlider.value),
                    loan_admin_fee: Number(document.getElementById('loan_admin_fee').value),
                    loan_monthly_installment: Number(document.getElementById('loan_monthly_installment').value),
                    loan_status: "Ditinjau" // Status berubah saat diajukan
                }
            };

            try {
                const response = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}/${RECORD_ID}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${AIRTABLE_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    showModal(true, "Berhasil Terkirim", "Pengajuan pinjaman Anda sebesar " + formatRupiah(amountSlider.value) + " sedang kami tinjau. Mohon tunggu informasi selanjutnya.");
                } else {
                    const errData = await response.json();
                    throw new Error(errData.error.message || "Gagal memperbarui data");
                }
            } catch (error) {
                showModal(false, "Oops! Gagal", "Terjadi kesalahan: " + error.message + ". Silakan coba beberapa saat lagi.");
            } finally {
                btn.disabled = false;
                btn.textContent = "Ajukan Sekarang";
            }
        });

        // UI Modal
        function showModal(success, title, msg) {
            const modal = document.getElementById('statusModal');
            const icon = document.getElementById('modal_icon');
            
            modal.classList.remove('hidden');
            document.getElementById('modal_title').textContent = title;
            document.getElementById('modal_msg').textContent = msg;

            if (success) {
                icon.className = "mx-auto w-20 h-20 rounded-full flex items-center justify-center bg-green-100 text-green-600 shadow-inner";
                icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7" /></svg>';
            } else {
                icon.className = "mx-auto w-20 h-20 rounded-full flex items-center justify-center bg-red-100 text-red-600 shadow-inner";
                icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M6 18L18 6M6 6l12 12" /></svg>';
            }
        }

        amountSlider.addEventListener('input', calculateValues);
        durationSlider.addEventListener('input', calculateValues);

        window.onload = fetchInitialData;
    </script>
</body>
</html>
