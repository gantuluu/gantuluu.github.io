<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Logistics Admin Pro - J&T Style</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet JS & CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        :root {
            --jt-red: #E30613;
            --jt-dark: #231F20;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            /* Native-like behavior */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }

        /* Anti-Zoom Protection */
        input, select, textarea {
            font-size: 16px !important; /* Mencegah auto-zoom di iOS */
        }

        .no-zoom {
            touch-action: pan-x pan-y;
        }

        .map-picker {
            height: 200px;
            width: 100%;
            border-radius: 12px;
            z-index: 10;
            border: 2px solid #e5e7eb;
        }

        .nav-active {
            color: var(--jt-red);
            border-bottom: 3px solid var(--jt-red);
        }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

        .btn-jt {
            background-color: var(--jt-red);
            color: white;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-jt:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .status-pill {
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="no-zoom">

<div class="app-container">
    <!-- Header -->
    <header class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#E30613] rounded-lg flex items-center justify-center">
                <span class="text-white font-bold text-xs italic">J&T</span>
            </div>
            <h1 class="text-lg font-bold tracking-tight text-gray-800">Logistic<span class="text-red-600">Pro</span></h1>
        </div>
        <button onclick="fetchData()" class="text-gray-400 hover:text-red-600 transition-colors">
            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
        </button>
    </header>

    <!-- Navigation Tab -->
    <nav class="flex border-b bg-white">
        <button id="tab-list" onclick="switchPage('list')" class="flex-1 py-3 text-sm font-bold text-gray-400 nav-active">DAFTAR RESI</button>
        <button id="tab-form" onclick="switchPage('form')" class="flex-1 py-3 text-sm font-bold text-gray-400">INPUT BARU</button>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto custom-scroll bg-[#f8f9fa]">
        
        <!-- Page: List View -->
        <div id="page-list" class="p-4 space-y-4">
            <div class="flex justify-between items-center px-1">
                <span id="data-stats" class="text-xs font-semibold text-gray-500 uppercase tracking-wider italic">Memuat data...</span>
                <div class="flex gap-2">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                </div>
            </div>
            <div id="list-container" class="space-y-3">
                <!-- Skeleton Loader -->
                <div class="bg-white p-4 rounded-xl shadow-sm border animate-pulse">
                    <div class="h-4 bg-gray-200 rounded w-1/3 mb-4"></div>
                    <div class="h-3 bg-gray-100 rounded w-full mb-2"></div>
                    <div class="h-3 bg-gray-100 rounded w-2/3"></div>
                </div>
            </div>
        </div>

        <!-- Page: Form View -->
        <div id="page-form" class="hidden p-4 pb-12">
            <form id="main-form" class="space-y-6" onsubmit="handleSubmit(event)">
                <input type="hidden" id="record-id">

                <!-- Section: Detail Paket -->
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                    <div class="flex items-center gap-2 mb-2">
                        <i data-lucide="package" class="w-5 h-5 text-red-600"></i>
                        <h3 class="font-bold text-gray-800 uppercase text-xs tracking-widest">Detail Paket</h3>
                    </div>
                    
                    <div class="space-y-3">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Nomor Resi</label>
                            <input type="text" id="nomorResi" required placeholder="Contoh: JT1002394" class="w-full mt-1 p-3 bg-gray-50 border-0 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition-all">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Tanggal</label>
                                <input type="date" id="date" required class="w-full mt-1 p-3 bg-gray-50 border-0 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Layanan</label>
                                <select id="service" class="w-full mt-1 p-3 bg-gray-50 border-0 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                                    <option value="EZ">EZ (Reguler)</option>
                                    <option value="ECO">ECO (Ekonomi)</option>
                                    <option value="J&T Super">J&T Super</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Status Utama</label>
                                <select id="statusPengiriman" class="w-full mt-1 p-3 bg-gray-50 border-0 rounded-xl font-bold text-red-600 focus:ring-2 focus:ring-red-500 outline-none">
                                    <option value="Picked Up">Picked Up</option>
                                    <option value="On Process">On Process</option>
                                    <option value="On Transit">On Transit</option>
                                    <option value="Delivered">Delivered</option>
                                    <option value="Problem">Problem</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Progress (%)</label>
                                <input type="number" id="statusPercent" min="0" max="100" class="w-full mt-1 p-3 bg-gray-50 border-0 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Berat (Kg)</label>
                                <input type="text" id="weight" placeholder="1.0" class="w-full mt-1 p-3 bg-gray-50 border-0 rounded-xl">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Metode Bayar</label>
                                <select id="select_method" class="w-full mt-1 p-3 bg-gray-50 border-0 rounded-xl">
                                    <option value="Cash">Cash</option>
                                    <option value="COD">COD</option>
                                    <option value="Billed">Billed</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section: Pengirim & Penerima -->
                <div class="grid grid-cols-1 gap-4">
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                        <div class="flex items-center gap-2 mb-2">
                            <i data-lucide="send" class="w-4 h-4 text-gray-400"></i>
                            <h3 class="font-bold text-gray-800 uppercase text-xs tracking-widest">Pengirim</h3>
                        </div>
                        <input type="text" id="pengirim_nama" placeholder="Nama Lengkap" class="w-full p-3 bg-gray-50 border-0 rounded-xl">
                        <input type="tel" id="pengirim_telepon" placeholder="No. Telepon" class="w-full p-3 bg-gray-50 border-0 rounded-xl">
                        <textarea id="pengirim_alamat" placeholder="Alamat Asal" rows="2" class="w-full p-3 bg-gray-50 border-0 rounded-xl"></textarea>
                    </div>

                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                        <div class="flex items-center gap-2 mb-2">
                            <i data-lucide="map-pin" class="w-4 h-4 text-red-500"></i>
                            <h3 class="font-bold text-gray-800 uppercase text-xs tracking-widest">Penerima</h3>
                        </div>
                        <input type="text" id="penerima_nama" placeholder="Nama Lengkap" class="w-full p-3 bg-gray-50 border-0 rounded-xl">
                        <input type="tel" id="penerima_telepon" placeholder="No. Telepon" class="w-full p-3 bg-gray-50 border-0 rounded-xl">
                        <textarea id="penerima_alamat" placeholder="Alamat Tujuan" rows="2" class="w-full p-3 bg-gray-50 border-0 rounded-xl"></textarea>
                    </div>
                </div>

                <!-- Section: Gateway & Maps -->
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                    <div class="flex items-center gap-2 mb-2">
                        <i data-lucide="navigation" class="w-5 h-5 text-blue-500"></i>
                        <h3 class="font-bold text-gray-800 uppercase text-xs tracking-widest">Gateway & Lokasi</h3>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <input type="text" id="origin_gateway" placeholder="Origin Gateway (cth: Jakarta)" class="w-full p-3 bg-gray-50 border-0 rounded-xl mb-2">
                            <input type="text" id="origin_coordinate" readonly placeholder="Klik peta untuk koordinat asal" class="w-full p-2 text-[10px] bg-gray-100 rounded-lg mb-2 text-gray-500 font-mono">
                            <div id="map-origin" class="map-picker"></div>
                        </div>

                        <hr class="border-dashed">

                        <div>
                            <input type="text" id="destination_gateway" placeholder="Destination Gateway (cth: Surabaya)" class="w-full p-3 bg-gray-50 border-0 rounded-xl mb-2">
                            <input type="text" id="destination_coordinate" readonly placeholder="Klik peta untuk koordinat tujuan" class="w-full p-2 text-[10px] bg-gray-100 rounded-lg mb-2 text-gray-500 font-mono">
                            <div id="map-dest" class="map-picker"></div>
                        </div>
                    </div>
                </div>

                <!-- Section: Travel History -->
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex items-center gap-2">
                            <i data-lucide="history" class="w-5 h-5 text-purple-500"></i>
                            <h3 class="font-bold text-gray-800 uppercase text-xs tracking-widest">Riwayat Perjalanan</h3>
                        </div>
                        <button type="button" onclick="addHistory()" class="bg-gray-100 text-gray-600 p-2 rounded-lg hover:bg-red-50 hover:text-red-600 transition-all">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div id="history-list" class="space-y-3">
                        <!-- Dynamic items -->
                    </div>
                </div>

                <!-- Submit Buttons -->
                <div class="flex flex-col gap-3 pt-4">
                    <button type="submit" class="btn-jt w-full py-4 rounded-2xl shadow-xl shadow-red-200 uppercase tracking-widest text-sm">SIMPAN DATA LOGISTIK</button>
                    <button type="button" onclick="resetForm(); switchPage('list')" class="w-full py-3 text-gray-400 font-bold text-xs uppercase tracking-widest">Batalkan</button>
                </div>
            </form>
        </div>
    </main>

    <!-- Overlay Loader -->
    <div id="loader" class="hidden fixed inset-0 z-[9999] bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-red-200 border-t-red-600 rounded-full animate-spin"></div>
        <p class="mt-4 text-xs font-bold text-red-600 tracking-widest uppercase">Sinkronisasi Airtable...</p>
    </div>
</div>

<script>
    // --- Airtable Configuration ---
    const CONFIG = {
        apiKey: 'patUMdRHlYzisW8N8.f1086aa1a402591d6812fc69cbdd5bff622ed972b7d934f9cf895759259e767f',
        baseId: 'appglOaYqdBvMnz21',
        tableName: 'jntexpress'
    };
    const API_URL = `https://api.airtable.com/v0/${CONFIG.baseId}/${CONFIG.tableName}`;

    let maps = { origin: null, dest: null };
    let markers = { origin: null, dest: null };
    let currentRecords = [];

    // --- Core Logic ---
    window.onload = () => {
        lucide.createIcons();
        initMaps();
        fetchData();
        setupAntiZoom();
    };

    function setupAntiZoom() {
        // Blokir Ctrl+/Cmd+ plus/minus
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && (e.key === '=' || e.key === '-' || e.key === '0')) {
                e.preventDefault();
            }
        });
        // Blokir Pinch Zoom
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
    }

    function initMaps() {
        const DEFAULT_COORD = [-6.200000, 106.816666]; // Jakarta
        
        // Map Origin
        maps.origin = L.map('map-origin', { zoomControl: false }).setView(DEFAULT_COORD, 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(maps.origin);
        maps.origin.on('click', (e) => setMarker('origin', e.latlng));

        // Map Destination
        maps.dest = L.map('map-dest', { zoomControl: false }).setView(DEFAULT_COORD, 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(maps.dest);
        maps.dest.on('click', (e) => setMarker('dest', e.latlng));
    }

    function setMarker(type, latlng) {
        if (markers[type]) maps[type].removeLayer(markers[type]);
        markers[type] = L.marker(latlng).addTo(maps[type]);
        document.getElementById(`${type}_coordinate`).value = `${latlng.lat.toFixed(6)}, ${latlng.lng.toFixed(6)}`;
    }

    // --- Page Management ---
    function switchPage(page) {
        document.getElementById('page-list').classList.add('hidden');
        document.getElementById('page-form').classList.add('hidden');
        document.getElementById('tab-list').classList.remove('nav-active');
        document.getElementById('tab-form').classList.remove('nav-active');

        if (page === 'list') {
            document.getElementById('page-list').classList.remove('hidden');
            document.getElementById('tab-list').classList.add('nav-active');
        } else {
            document.getElementById('page-form').classList.remove('hidden');
            document.getElementById('tab-form').classList.add('nav-active');
            // Fix Leaflet rendering issue
            setTimeout(() => {
                maps.origin.invalidateSize();
                maps.dest.invalidateSize();
            }, 300);
        }
    }

    // --- API Integration ---
    async function fetchData() {
        toggleLoader(true);
        try {
            const res = await fetch(`${API_URL}?sort[0][field]=date&sort[0][direction]=desc`, {
                headers: { Authorization: `Bearer ${CONFIG.apiKey}` }
            });
            const data = await res.json();
            currentRecords = data.records;
            renderList(data.records);
        } catch (err) {
            notify("Koneksi gagal");
        } finally {
            toggleLoader(false);
        }
    }

    function renderList(records) {
        const container = document.getElementById('list-container');
        const stats = document.getElementById('data-stats');
        stats.innerText = `${records.length} Resi Aktif`;

        if (records.length === 0) {
            container.innerHTML = `<div class="p-20 text-center text-gray-300 italic text-xs">Belum ada data pengiriman</div>`;
            return;
        }

        container.innerHTML = records.map(rec => {
            const f = rec.fields;
            const color = getStatusColor(f.statusPengiriman);
            return `
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex flex-col gap-3">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">${f.date || '-'}</span>
                            <h4 class="font-bold text-gray-800 text-sm tracking-tight">${f.nomorResi || 'TIDAK ADA RESI'}</h4>
                        </div>
                        <span class="status-pill" style="background: ${color}20; color: ${color}">${f.statusPengiriman || 'Unkown'}</span>
                    </div>
                    
                    <div class="flex items-center justify-between text-[11px] bg-gray-50 p-2 rounded-lg">
                        <div class="flex flex-col">
                            <span class="text-[8px] text-gray-400 uppercase font-bold">Pengirim</span>
                            <span class="text-gray-700 font-semibold truncate w-24">${f.pengirim_nama || '-'}</span>
                        </div>
                        <i data-lucide="arrow-right" class="w-3 h-3 text-gray-300"></i>
                        <div class="flex flex-col text-right">
                            <span class="text-[8px] text-gray-400 uppercase font-bold">Penerima</span>
                            <span class="text-gray-700 font-semibold truncate w-24">${f.penerima_nama || '-'}</span>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="editRecord('${rec.id}')" class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-xl text-[11px] font-bold uppercase tracking-widest">Detail</button>
                        <button onclick="deleteRecord('${rec.id}')" class="px-4 bg-red-50 text-red-500 py-2 rounded-xl"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `;
        }).join('');
        lucide.createIcons();
    }

    function getStatusColor(status) {
        const map = {
            'Delivered': '#10b981',
            'Problem': '#ef4444',
            'On Transit': '#f59e0b',
            'On Process': '#3b82f6',
            'Picked Up': '#6366f1'
        };
        return map[status] || '#9ca3af';
    }

    // --- Travel History Logic ---
    function addHistory(val = { date: '', location: '', status: '', note: '' }) {
        const id = Date.now();
        const html = `
            <div id="h-${id}" class="h-item p-3 bg-gray-50 rounded-xl border-l-4 border-red-500 relative space-y-2">
                <button type="button" onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-gray-300"><i data-lucide="x" class="w-3 h-3"></i></button>
                <div class="grid grid-cols-2 gap-2">
                    <input type="datetime-local" class="h-date text-[10px] p-1 border rounded w-full" value="${val.date}">
                    <input type="text" class="h-status text-[10px] p-1 border rounded w-full" placeholder="Status" value="${val.status}">
                </div>
                <input type="text" class="h-loc text-[10px] p-1 border rounded w-full" placeholder="Lokasi" value="${val.location}">
                <textarea class="h-note text-[10px] p-1 border rounded w-full" placeholder="Catatan" rows="1">${val.note}</textarea>
            </div>
        `;
        document.getElementById('history-list').insertAdjacentHTML('beforeend', html);
        lucide.createIcons();
    }

    // --- CRUD Actions ---
    async function handleSubmit(e) {
        e.preventDefault();
        toggleLoader(true);

        const recId = document.getElementById('record-id').value;
        const histories = Array.from(document.querySelectorAll('.h-item')).map(el => ({
            date: el.querySelector('.h-date').value,
            location: el.querySelector('.h-loc').value,
            status: el.querySelector('.h-status').value,
            note: el.querySelector('.h-note').value
        }));

        const fields = {
            nomorResi: document.getElementById('nomorResi').value,
            date: document.getElementById('date').value,
            statusPengiriman: document.getElementById('statusPengiriman').value,
            statusPercent: parseInt(document.getElementById('statusPercent').value || 0),
            service: document.getElementById('service').value,
            weight: document.getElementById('weight').value,
            select_method: document.getElementById('select_method').value,
            pengirim_nama: document.getElementById('pengirim_nama').value,
            pengirim_telepon: document.getElementById('pengirim_telepon').value,
            pengirim_alamat: document.getElementById('pengirim_alamat').value,
            penerima_nama: document.getElementById('penerima_nama').value,
            penerima_telepon: document.getElementById('penerima_telepon').value,
            penerima_alamat: document.getElementById('penerima_alamat').value,
            origin_gateway: document.getElementById('origin_gateway').value,
            origin_coordinate: document.getElementById('origin_coordinate').value,
            destination_gateway: document.getElementById('destination_gateway').value,
            destination_coordinate: document.getElementById('destination_coordinate').value,
            travel_history: JSON.stringify(histories)
        };

        try {
            const url = recId ? `${API_URL}/${recId}` : API_URL;
            const method = recId ? 'PATCH' : 'POST';
            const body = recId ? { fields } : { records: [{ fields }] };

            const response = await fetch(url, {
                method,
                headers: {
                    'Authorization': `Bearer ${CONFIG.apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            if (response.ok) {
                notify(recId ? "Update berhasil" : "Data tersimpan");
                resetForm();
                fetchData();
                switchPage('list');
            } else {
                throw new Error();
            }
        } catch (err) {
            notify("Gagal mengirim data");
        } finally {
            toggleLoader(false);
        }
    }

    function editRecord(id) {
        const rec = currentRecords.find(r => r.id === id);
        if (!rec) return;
        const f = rec.fields;

        resetForm();
        document.getElementById('record-id').value = id;
        document.getElementById('nomorResi').value = f.nomorResi || '';
        document.getElementById('date').value = f.date || '';
        document.getElementById('statusPengiriman').value = f.statusPengiriman || 'Picked Up';
        document.getElementById('statusPercent').value = f.statusPercent || 0;
        document.getElementById('service').value = f.service || 'EZ';
        document.getElementById('weight').value = f.weight || '';
        document.getElementById('select_method').value = f.select_method || 'Cash';
        
        document.getElementById('pengirim_nama').value = f.pengirim_nama || '';
        document.getElementById('pengirim_telepon').value = f.pengirim_telepon || '';
        document.getElementById('pengirim_alamat').value = f.pengirim_alamat || '';
        
        document.getElementById('penerima_nama').value = f.penerima_nama || '';
        document.getElementById('penerima_telepon').value = f.penerima_telepon || '';
        document.getElementById('penerima_alamat').value = f.penerima_alamat || '';

        document.getElementById('origin_gateway').value = f.origin_gateway || '';
        document.getElementById('origin_coordinate').value = f.origin_coordinate || '';
        document.getElementById('destination_gateway').value = f.destination_gateway || '';
        document.getElementById('destination_coordinate').value = f.destination_coordinate || '';

        // Restore Maps
        if (f.origin_coordinate) {
            const [lat, lng] = f.origin_coordinate.split(',').map(n => parseFloat(n));
            setMarker('origin', { lat, lng });
            maps.origin.setView([lat, lng], 13);
        }
        if (f.destination_coordinate) {
            const [lat, lng] = f.destination_coordinate.split(',').map(n => parseFloat(n));
            setMarker('dest', { lat, lng });
            maps.dest.setView([lat, lng], 13);
        }

        // Restore History
        if (f.travel_history) {
            try {
                const hist = JSON.parse(f.travel_history);
                hist.forEach(h => addHistory(h));
            } catch(e) {}
        }

        switchPage('form');
    }

    async function deleteRecord(id) {
        if (!confirm("Hapus data resi ini?")) return;
        toggleLoader(true);
        try {
            const res = await fetch(`${API_URL}/${id}`, {
                method: 'DELETE',
                headers: { Authorization: `Bearer ${CONFIG.apiKey}` }
            });
            if (res.ok) fetchData();
        } catch (e) {
            notify("Gagal menghapus");
        } finally {
            toggleLoader(false);
        }
    }

    // --- Utilities ---
    function resetForm() {
        document.getElementById('main-form').reset();
        document.getElementById('record-id').value = '';
        document.getElementById('history-list').innerHTML = '';
        if (markers.origin) maps.origin.removeLayer(markers.origin);
        if (markers.dest) maps.dest.removeLayer(markers.dest);
        markers = { origin: null, dest: null };
    }

    function toggleLoader(show) {
        document.getElementById('loader').classList.toggle('hidden', !show);
    }

    function notify(msg) {
        const el = document.createElement('div');
        el.className = "fixed bottom-20 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest z-[10000] shadow-2xl animate-bounce";
        el.innerText = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2500);
    }
</script>

</body>
</html>
