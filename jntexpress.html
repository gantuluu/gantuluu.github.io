<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Anti-Zoom Meta Tag -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J&T Express Manager - Logistik</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        :root {
            --jt-red: #ff0000;
            --jt-dark: #1a1a1a;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #121212; /* Background luar abu gelap */
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container Utama Mobile-First */
        .app-shell {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background-color: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Content Scrollable */
        .scroll-container {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none; /* Hide scrollbar Firefox */
            -ms-overflow-style: none; /* Hide scrollbar IE/Edge */
            padding-bottom: 100px;
        }
        .scroll-container::-webkit-scrollbar {
            display: none; /* Hide scrollbar Chrome/Safari */
        }

        /* Anti-Zoom CSS */
        input, select, textarea, button {
            font-size: 16px !important; 
            touch-action: manipulation;
        }

        /* Map Styling */
        .map-box {
            height: 200px;
            width: 100%;
            border-radius: 12px;
            margin-top: 8px;
            border: 1px solid #e5e7eb;
            z-index: 1;
        }

        /* UI Elements */
        .btn-primary {
            background-color: var(--jt-red);
            color: white;
            transition: all 0.2s;
        }
        .btn-primary:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .input-group {
            border-bottom: 1.5px solid #eee;
            padding: 8px 0;
            transition: border-color 0.3s;
        }
        .input-group:focus-within {
            border-color: var(--jt-red);
        }
        .input-label {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            color: #999;
            margin-bottom: 2px;
        }
        .input-field {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-weight: 500;
            color: var(--jt-dark);
        }

        /* Loading Overlay */
        #loader {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
            z-index: 100;
        }

        /* History Entry */
        .history-card {
            border-left: 2px solid var(--jt-red);
            padding-left: 12px;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <!-- Header -->
        <header class="px-6 pt-6 pb-4 bg-white sticky top-0 z-20 flex justify-between items-center border-b border-gray-50">
            <div>
                <h1 id="header-title" class="text-xl font-extrabold text-red-600 tracking-tight">J&T EXPRESS</h1>
                <p id="header-subtitle" class="text-[10px] font-medium text-gray-400">LOGISTICS MANAGEMENT SYSTEM</p>
            </div>
            <div id="header-actions">
                <button onclick="openForm()" class="bg-red-50 text-red-600 p-2 rounded-full active:scale-90 transition-transform">
                    <i data-lucide="plus-circle"></i>
                </button>
            </div>
        </header>

        <!-- Loader -->
        <div id="loader" class="hidden absolute inset-0 flex items-center justify-center">
            <div class="flex flex-col items-center">
                <div class="w-8 h-8 border-4 border-red-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-xs font-bold mt-4 text-gray-500">MEMPROSES...</p>
            </div>
        </div>

        <div class="scroll-container">
            
            <!-- PAGE: LIST -->
            <div id="page-list" class="p-6 space-y-4">
                <div id="list-render" class="space-y-4">
                    <!-- Data dari Airtable akan muncul di sini -->
                </div>
            </div>

            <!-- PAGE: FORM -->
            <div id="page-form" class="hidden p-6">
                <form id="main-form" class="space-y-8">
                    <input type="hidden" id="record-id">
                    
                    <!-- Section: Detail Paket -->
                    <section>
                        <h3 class="text-sm font-bold flex items-center gap-2 mb-4 text-gray-800">
                            <i data-lucide="package" class="w-4 h-4"></i> DETAIL PAKET
                        </h3>
                        <div class="space-y-4">
                            <div class="input-group">
                                <label class="input-label">Nomor Resi</label>
                                <input type="text" id="nomorResi" class="input-field" placeholder="Contoh: JX123456789" required>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="input-group">
                                    <label class="input-label">Tanggal</label>
                                    <input type="datetime-local" id="date" class="input-field" required>
                                </div>
                                <div class="input-group">
                                    <label class="input-label">Status (%)</label>
                                    <input type="number" id="statusPercent" class="input-field" value="0">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="input-group">
                                    <label class="input-label">Layanan</label>
                                    <select id="service" class="input-field">
                                        <option value="EZ">EZ (Reguler)</option>
                                        <option value="ECO">ECO (Ekonomi)</option>
                                        <option value="J&T Super">J&T Super</option>
                                    </select>
                                </div>
                                <div class="input-group">
                                    <label class="input-label">Status Pengiriman</label>
                                    <select id="statusPengiriman" class="input-field">
                                        <option value="dikirim">Dikirim</option>
                                        <option value="transit">Transit</option>
                                        <option value="bermasalah">Bermasalah</option>
                                        <option value="diterima">Diterima</option>
                                    </select>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="input-group">
                                    <label class="input-label">Biaya (Rp)</label>
                                    <input type="number" id="biayaKirim" class="input-field" placeholder="0">
                                </div>
                                <div class="input-group">
                                    <label class="input-label">Berat</label>
                                    <input type="text" id="weight" class="input-field" placeholder="1.0kg">
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- Section: Pengirim & Penerima -->
                    <div class="grid grid-cols-1 gap-8">
                        <section class="bg-gray-50 p-4 rounded-2xl">
                            <h3 class="text-xs font-bold flex items-center gap-2 mb-3 text-red-600">
                                <i data-lucide="upload-cloud" class="w-4 h-4"></i> PENGIRIM
                            </h3>
                            <div class="space-y-3">
                                <input type="text" id="pengirim_nama" class="w-full bg-white px-3 py-2 rounded-lg border-none text-sm font-medium outline-none" placeholder="Nama Pengirim">
                                <input type="tel" id="pengirim_telepon" class="w-full bg-white px-3 py-2 rounded-lg border-none text-sm font-medium outline-none" placeholder="Telepon">
                                <input type="text" id="pengirim_kota" class="w-full bg-white px-3 py-2 rounded-lg border-none text-sm font-medium outline-none" placeholder="Kota Asal">
                            </div>
                        </section>

                        <section class="bg-gray-50 p-4 rounded-2xl">
                            <h3 class="text-xs font-bold flex items-center gap-2 mb-3 text-red-600">
                                <i data-lucide="download-cloud" class="w-4 h-4"></i> PENERIMA
                            </h3>
                            <div class="space-y-3">
                                <input type="text" id="penerima_nama" class="w-full bg-white px-3 py-2 rounded-lg border-none text-sm font-medium outline-none" placeholder="Nama Penerima">
                                <input type="tel" id="penerima_telepon" class="w-full bg-white px-3 py-2 rounded-lg border-none text-sm font-medium outline-none" placeholder="Telepon">
                                <textarea id="penerima_alamat" class="w-full bg-white px-3 py-2 rounded-lg border-none text-sm font-medium outline-none" placeholder="Alamat Lengkap" rows="2"></textarea>
                            </div>
                        </section>
                    </div>

                    <!-- Section: Geolocation -->
                    <section class="space-y-6">
                        <h3 class="text-sm font-bold flex items-center gap-2 text-gray-800">
                            <i data-lucide="map" class="w-4 h-4"></i> GATEWAY & KOORDINAT
                        </h3>
                        
                        <div class="space-y-2">
                            <label class="input-label text-red-600">Asal (Origin)</label>
                            <input type="text" id="origin_gateway" class="w-full p-2 bg-gray-100 rounded text-sm font-bold outline-none" placeholder="Nama Gateway Asal">
                            <div id="map-origin" class="map-box"></div>
                            <input type="text" id="origin_cordinate" readonly class="text-[10px] text-gray-400 w-full bg-transparent">
                        </div>

                        <div class="space-y-2">
                            <label class="input-label text-red-600">Tujuan (Destination)</label>
                            <input type="text" id="destination_gateway" class="w-full p-2 bg-gray-100 rounded text-sm font-bold outline-none" placeholder="Nama Gateway Tujuan">
                            <div id="map-dest" class="map-box"></div>
                            <input type="text" id="destination_cordinate" readonly class="text-[10px] text-gray-400 w-full bg-transparent">
                        </div>
                    </section>

                    <!-- Section: Travel History -->
                    <section class="space-y-4">
                        <div class="flex justify-between items-center">
                            <h3 class="text-sm font-bold flex items-center gap-2 text-gray-800">
                                <i data-lucide="history" class="w-4 h-4"></i> RIWAYAT PERJALANAN
                            </h3>
                            <button type="button" onclick="addHistoryItem()" class="text-[10px] font-bold bg-black text-white px-3 py-1 rounded-full">+ BARIS</button>
                        </div>
                        <div id="history-list" class="space-y-4">
                            <!-- Dynamic History Rows -->
                        </div>
                    </section>

                    <!-- Action Buttons -->
                    <div class="flex gap-3 pt-6">
                        <button type="button" onclick="saveData()" class="flex-1 btn-primary py-4 rounded-2xl font-bold shadow-xl shadow-red-200">
                            SIMPAN DATA
                        </button>
                        <button type="button" id="delete-btn" onclick="deleteData()" class="hidden bg-gray-100 text-red-600 px-6 rounded-2xl">
                            <i data-lucide="trash-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-black/90 text-white px-6 py-3 rounded-full text-xs font-bold opacity-0 transition-all pointer-events-none z-[100]">
            NOTIFIKASI
        </div>

        <!-- Tab Bar Navigation -->
        <nav class="absolute bottom-0 inset-x-0 h-20 bg-white border-t border-gray-100 flex items-center justify-around px-10 z-30">
            <button onclick="closeForm()" class="flex flex-col items-center gap-1 text-red-600">
                <i data-lucide="layout-grid" class="w-6 h-6"></i>
                <span class="text-[9px] font-bold">DAFTAR</span>
            </button>
            <button onclick="openForm()" class="flex flex-col items-center gap-1 text-gray-300">
                <i data-lucide="plus-square" class="w-6 h-6"></i>
                <span class="text-[9px] font-bold">TAMBAH</span>
            </button>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- KONFIGURASI AIRTABLE ---
        const CFG = {
            pat: 'patUMdRHlYzisW8N8.f1086aa1a402591d6812fc69cbdd5bff622ed972b7d934f9cf895759259e767f',
            base: 'appglOaYqdBvMnz21',
            table: 'jntexpress'
        };
        const ENDPOINT = `https://api.airtable.com/v0/${CFG.base}/${CFG.table}`;

        // --- STATE ---
        let mapO, mapD, markerO, markerD;

        // --- INISIALISASI ---
        window.onload = () => {
            lucide.createIcons();
            initMaps();
            fetchData();
            setupAntiZoom();
        };

        function setupAntiZoom() {
            document.addEventListener('touchstart', (e) => {
                if (e.touches.length > 1) e.preventDefault();
            }, { passive: false });
        }

        function initMaps() {
            const center = [-6.2000, 106.8166];
            
            mapO = L.map('map-origin', { zoomControl: false }).setView(center, 11);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapO);
            mapO.on('click', e => setMarker('origin', e.latlng.lat, e.latlng.lng));

            mapD = L.map('map-dest', { zoomControl: false }).setView(center, 11);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapD);
            mapD.on('click', e => setMarker('dest', e.latlng.lat, e.latlng.lng));
        }

        function setMarker(type, lat, lng) {
            const coordStr = `${lat.toFixed(6)},${lng.toFixed(6)}`;
            if(type === 'origin') {
                if(markerO) mapO.removeLayer(markerO);
                markerO = L.marker([lat, lng]).addTo(mapO);
                document.getElementById('origin_cordinate').value = coordStr;
            } else {
                if(markerD) mapD.removeLayer(markerD);
                markerD = L.marker([lat, lng]).addTo(mapD);
                document.getElementById('destination_cordinate').value = coordStr;
            }
        }

        // --- FUNGSI CRUD ---

        async function fetchData() {
            toggleLoader(true);
            try {
                const res = await fetch(ENDPOINT, {
                    headers: { Authorization: `Bearer ${CFG.pat}` }
                });
                const data = await res.json();
                renderList(data.records);
            } catch (e) {
                showToast("Gagal memuat data");
            } finally {
                toggleLoader(false);
            }
        }

        function renderList(records) {
            const container = document.getElementById('list-render');
            container.innerHTML = '';
            
            if(!records || records.length === 0) {
                container.innerHTML = `<div class="py-20 text-center text-gray-400 text-xs font-bold">TIDAK ADA DATA</div>`;
                return;
            }

            records.forEach(rec => {
                const f = rec.fields;
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-3xl border border-gray-100 shadow-sm active:scale-[0.98] transition-all cursor-pointer";
                card.onclick = () => openEdit(rec);
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="bg-red-50 text-red-600 text-[10px] font-black px-3 py-1 rounded-full uppercase">
                            ${f.statusPengiriman || 'PROSES'}
                        </div>
                        <span class="text-[10px] font-bold text-gray-300">#${rec.id.slice(-5)}</span>
                    </div>
                    <h4 class="text-lg font-black text-gray-800 leading-tight">${f.nomorResi || 'TIDAK ADA RESI'}</h4>
                    <div class="mt-4 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-400">
                                <i data-lucide="user" class="w-4 h-4"></i>
                            </div>
                            <div>
                                <p class="text-[9px] font-bold text-gray-400 uppercase">Penerima</p>
                                <p class="text-xs font-bold text-gray-700">${f.penerima_nama || '-'}</p>
                            </div>
                        </div>
                        <div class="text-right">
                             <p class="text-[9px] font-bold text-gray-400 uppercase">Biaya</p>
                             <p class="text-xs font-black text-green-600">Rp${(f.biayaKirim || 0).toLocaleString()}</p>
                        </div>
                    </div>
                    <div class="mt-4 w-full bg-gray-50 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-red-600 h-full" style="width: ${f.statusPercent || 0}%"></div>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        async function saveData() {
            const id = document.getElementById('record-id').value;
            const historyData = collectHistory();
            
            const payload = {
                fields: {
                    nomorResi: document.getElementById('nomorResi').value,
                    date: new Date(document.getElementById('date').value).toISOString(),
                    statusPercent: parseInt(document.getElementById('statusPercent').value) || 0,
                    statusPengiriman: document.getElementById('statusPengiriman').value,
                    biayaKirim: parseInt(document.getElementById('biayaKirim').value) || 0,
                    service: document.getElementById('service').value,
                    weight: document.getElementById('weight').value,
                    pengirim_nama: document.getElementById('pengirim_nama').value,
                    pengirim_telepon: parseInt(document.getElementById('pengirim_telepon').value) || 0,
                    pengirim_kota: document.getElementById('pengirim_kota').value,
                    penerima_nama: document.getElementById('penerima_nama').value,
                    penerima_telepon: parseInt(document.getElementById('penerima_telepon').value) || 0,
                    penerima_alamat: document.getElementById('penerima_alamat').value,
                    origin_gateway: document.getElementById('origin_gateway').value,
                    origin_cordinate: document.getElementById('origin_cordinate').value,
                    destination_gateway: document.getElementById('destination_gateway').value,
                    destination_cordinate: document.getElementById('destination_cordinate').value,
                    travelHistory: JSON.stringify(historyData)
                }
            };

            toggleLoader(true);
            try {
                const url = id ? `${ENDPOINT}/${id}` : ENDPOINT;
                const method = id ? 'PATCH' : 'POST';
                const res = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': `Bearer ${CFG.pat}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    showToast(id ? "DATA DIPERBARUI" : "DATA TERSIMPAN");
                    closeForm();
                    fetchData();
                } else {
                    const err = await res.json();
                    showToast("ERROR: " + err.error.message);
                }
            } catch (e) {
                showToast("Gagal menghubungkan ke server");
            } finally {
                toggleLoader(false);
            }
        }

        async function deleteData() {
            const id = document.getElementById('record-id').value;
            if(!id) return;
            if(!confirm("Hapus data ini secara permanen?")) return;

            toggleLoader(true);
            try {
                const res = await fetch(`${ENDPOINT}/${id}`, {
                    method: 'DELETE',
                    headers: { Authorization: `Bearer ${CFG.pat}` }
                });
                if(res.ok) {
                    showToast("DATA DIHAPUS");
                    closeForm();
                    fetchData();
                }
            } catch(e) {
                showToast("Gagal menghapus");
            } finally {
                toggleLoader(false);
            }
        }

        // --- MANAJEMEN RIWAYAT (DYNAMIC) ---

        function addHistoryItem(data = null) {
            const container = document.getElementById('history-list');
            const div = document.createElement('div');
            div.className = "history-card bg-gray-50 p-3 rounded-xl space-y-2 relative";
            
            const now = data ? data.date.slice(0, 16) : new Date().toISOString().slice(0, 16);
            
            div.innerHTML = `
                <button type="button" onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-gray-300 hover:text-red-500">
                    <i data-lucide="x-circle" class="w-4 h-4"></i>
                </button>
                <input type="datetime-local" class="h-date w-full bg-transparent text-[10px] font-bold outline-none" value="${now}">
                <input type="text" class="h-loc w-full bg-transparent text-xs font-black placeholder-gray-400 outline-none" placeholder="Lokasi (Contoh: Surabaya)" value="${data ? data.location : ''}">
                <input type="text" class="h-stat w-full bg-transparent text-xs text-red-600 font-bold outline-none" placeholder="Status Paket" value="${data ? data.status : ''}">
                <textarea class="h-note w-full bg-transparent text-[10px] text-gray-500 outline-none" placeholder="Catatan Tambahan">${data ? data.note : ''}</textarea>
            `;
            container.prepend(div);
            lucide.createIcons();
        }

        function collectHistory() {
            const items = document.querySelectorAll('.history-card');
            const data = [];
            items.forEach(item => {
                data.push({
                    date: new Date(item.querySelector('.h-date').value).toISOString(),
                    location: item.querySelector('.h-loc').value,
                    status: item.querySelector('.h-stat').value,
                    note: item.querySelector('.h-note').value
                });
            });
            return data;
        }

        // --- NAVIGATION & UI HELPERS ---

        function openForm() {
            document.getElementById('page-list').classList.add('hidden');
            document.getElementById('page-form').classList.remove('hidden');
            document.getElementById('main-form').reset();
            document.getElementById('record-id').value = '';
            document.getElementById('history-list').innerHTML = '';
            document.getElementById('delete-btn').classList.add('hidden');
            
            document.getElementById('header-title').innerText = "INPUT BARU";
            
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('date').value = now.toISOString().slice(0, 16);

            setTimeout(() => {
                mapO.invalidateSize();
                mapD.invalidateSize();
            }, 300);
        }

        function openEdit(rec) {
            openForm();
            const f = rec.fields;
            document.getElementById('record-id').value = rec.id;
            document.getElementById('header-title').innerText = "EDIT RESI";
            document.getElementById('delete-btn').classList.remove('hidden');

            // Map Fields
            document.getElementById('nomorResi').value = f.nomorResi || '';
            document.getElementById('date').value = f.date ? f.date.slice(0, 16) : '';
            document.getElementById('statusPercent').value = f.statusPercent || 0;
            document.getElementById('statusPengiriman').value = f.statusPengiriman || 'dikirim';
            document.getElementById('biayaKirim').value = f.biayaKirim || 0;
            document.getElementById('service').value = f.service || 'EZ';
            document.getElementById('weight').value = f.weight || '';
            
            document.getElementById('pengirim_nama').value = f.pengirim_nama || '';
            document.getElementById('pengirim_telepon').value = f.pengirim_telepon || '';
            document.getElementById('pengirim_kota').value = f.pengirim_kota || '';
            
            document.getElementById('penerima_nama').value = f.penerima_nama || '';
            document.getElementById('penerima_telepon').value = f.penerima_telepon || '';
            document.getElementById('penerima_alamat').value = f.penerima_alamat || '';
            
            document.getElementById('origin_gateway').value = f.origin_gateway || '';
            document.getElementById('origin_cordinate').value = f.origin_cordinate || '';
            document.getElementById('destination_gateway').value = f.destination_gateway || '';
            document.getElementById('destination_cordinate').value = f.destination_cordinate || '';

            // Map Markers
            if(f.origin_cordinate) {
                const [lat, lng] = f.origin_cordinate.split(',').map(Number);
                setMarker('origin', lat, lng);
                mapO.setView([lat, lng], 13);
            }
            if(f.destination_cordinate) {
                const [lat, lng] = f.destination_cordinate.split(',').map(Number);
                setMarker('dest', lat, lng);
                mapD.setView([lat, lng], 13);
            }

            // History
            if(f.travelHistory) {
                try {
                    const hist = JSON.parse(f.travelHistory);
                    hist.forEach(h => addHistoryItem(h));
                } catch(e) {}
            }
        }

        function closeForm() {
            document.getElementById('page-form').classList.add('hidden');
            document.getElementById('page-list').classList.remove('hidden');
            document.getElementById('header-title').innerText = "J&T EXPRESS";
        }

        function toggleLoader(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2500);
        }
    </script>
</body>
</html>
